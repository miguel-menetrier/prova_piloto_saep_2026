<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Cadastro de usuário</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
</head>
<body>

<div class="container mt-3">

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Usuário</h6>
        </div>

        <div class="card-body">

            <!-- Formulário de cadastro -->
            <form method="post" th:action="@{/cadastro}" th:object="${usuarioDto}">

                <div class="mb-3">
                    <label for="usuario_nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}" id="usuario_nome"
                           placeholder="Joao da Silva" required/>
                </div>

                <div class="mb-3">
                    <label for="usuario_email" class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" id="usuario_email"
                           placeholder="joao@senai.com" required/>
                </div>


                <div class="mb-3">
                    <label for="role" class="form-label">Cargo</label>
                    <select id="role" th:field="*{cargo}" class="form-control" required>
                        <option value="" disabled selected>Selecione o tipo</option>
                        <option value="OPERADOR">Operador</option>
                        <option value="ADMINISTRADOR">Admin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="usuario_senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" th:field="*{senha}" id="usuario_senha" required/>
                </div>


                <div class="row">
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{~/login}" class="btn btn-secondary">Fechar</a>
                    </div>
                </div>

                <br><br>
                <div th:if="${param.erro}" class="alert alert-danger d-flex flex-column align-items-center text-center"
                     role="alert">
                    <span th:text="${erroDto.mensagem}">Mensagem de erro</span>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        crossorigin="anonymous"></script>

<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">© Turma 2023/2 - 2025/1 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

</body>
</html>

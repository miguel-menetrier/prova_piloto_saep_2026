<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Lista de produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/navbasStyle.css}">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>

<div class="container mt-3">

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Produtos</h6>
        </div>
        <div class="card-body">

            <p class="card-text">
                <a th:href="@{~/produtocadastro}" class="btn btn-primary">Cadastrar produto</a>
            </p>

            <div class="table-responsive">
                <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                    <tr>
                        <th>id</th>
                        <th>Nome</th>
                        <th>Estoque</th>
                        <th>Valor</th>
                        <th style="white-space: nowrap;">Atualizar</th>
                        <th style="white-space: nowrap;" sec:authorize="hasAuthority('ADMINISTRADOR')">Excluir</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="produto : ${produtoLista}">
                        <td th:text="${produto.id}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.estoque}"></td>
                        <td th:text="${produto.valor}"></td>
                        <td><a th:href="@{'/produtoatualizar/' + ${produto.id}}" class="btn btn-warning">Alterar</a></td>
                        <td sec:authorize="hasAuthority('ADMINISTRADOR')">
                            <button th:data-produto-id="${produto.id}" class="excluir btn btn-danger">Excluir</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="/script/excluir_produto.js"></script>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">&copy; Turma 2024/2 - 2026/1 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

</body>
</html>

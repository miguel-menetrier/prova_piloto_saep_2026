<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Define codificação UTF-8 e viewport responsivo para adaptação em dispositivos móveis -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Adicionar o Bootstrap na página-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- adiciona icones do bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
    <!-- Define o título da página na barra superior do navegador -->
    <title>Login</title>

</head>

<body>

<!-- Container principal -->
<div class="container">

    <!-- linha justificada -->
    <div class="row justify-content-center">

        <!-- Define uma coluna que ocupa 4/12 (33%) da largura em telas médias (≥768px) -->
        <div class="col-md-4">

            <!-- !-- Card com sombra grande (shadow-lg) e margem superior de 3rem (mt-5) -->
            <div class="card shadow-lg mt-5">

                <!-- Container de conteúdo interno de um card (com padding padrão) -->
                <div class="card-body">

                    <!-- Centraliza conteúdo horizontalmente e adiciona margin-bottom de 24px (1.5rem) -->
                    <h3 class="text-center mb-4">Login</h3>

                    <!-- inicio do formulário, deve conter apenas os inputs e botão-->
                    <form method="post" th:action="@{/login}" th:object="${loginDto}">

                        <!-- Adiciona uma margem inferior de 1rem (16px) ao elemento -->
                        <div class="mb-3">
                            <label for="user_login" class="form-label">E-mail</label>
                            <input type="email" class="form-control" th:field="*{username}" id="user_login"
                                   name="user_login" placeholder="seu_email@gmail.com" required/>
                        </div>

                        <!-- Adiciona uma margem inferior de 1rem (16px) ao elemento -->
                        <div class="mb-3">
                            <label for="user_password" class="form-label">Senha</label>
                            <input type="password" class="form-control" th:field="*{password}" id="user_password"
                                   name="user_password" placeholder="Informe sua senha" required/>
                        </div>

                        <!-- Botão de confirmação do formulário -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </div>

                        <!-- Fim do formulário -->
                    </form>

                    <!-- Adiciona margem superior de 1rem (16px) e centraliza o texto -->
                    <div class="mt-4 text-center">
                        <a th:href="@{/cadastro}" class="d-block">Não tem uma conta ainda? Cadastre-se!</a>
                    </div>

                    <!-- url passando parametro -> "localhost:8080/login?erro"  -->
                    <br><br>
                    <div th:if="${param.erro}"
                         class="alert alert-danger d-flex flex-column align-items-center text-center" role="alert">
                        <span th:text="${erroDto != null ? erroDto.mensagem : param.erro}">Mensagem de erro</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info" role="alert">
                        <span class="mensagem">Logout realizado com sucesso!</span>
                    </div>
                    <div th:if="${param.sucesso}" class="alert alert-success" role="alert">
                        <span>Usuário cadastrado com sucesso!</span>
                    </div>
                    <div th:if="${param.perfilatualizado}" class="alert alert-success" role="alert">
                        <span>Dados atualizados com sucesso! Faça login novamente.</span>
                    </div>

                </div>

                <!-- fim do "card-body" -->
            </div>

            <!-- fim do "card shadow-lg" -->
        </div>

        <!-- fim do "col-md-4" -->
    </div>

    <!-- fim do "row justify-content-center" -->
</div>

<!-- fim do Container principal -->
</div>

<!-- Adiciona javascript do bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu"
        crossorigin="anonymous"></script>

</body>
</html>

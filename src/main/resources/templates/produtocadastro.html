<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Cadastro de produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/navbasStyle.css}">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>

<div class="container mt-3">

    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Produto</h6>
        </div>

        <div class="card-body">

            <form method="post" th:action="@{/produto}" th:object="${produtoDto}">
                <div class="mb-3">
                    <label for="produto_nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}" id="produto_nome"
                           name="produto_nome" placeholder="Nome do produto" required/>
                </div>

                <div class="mb-3">
                    <label for="produto_estoque" class="form-label">Estoque</label>
                    <input type="number" min="1" step="1" class="form-control" th:field="*{estoque}"
                           id="produto_estoque" name="produto_estoque" placeholder="0.00" required/>
                </div>

                <div class="mb-3">
                    <label for="produto_preco" class="form-label">Preco</label>
                    <input type="number" min="0.01" step="0.01" class="form-control" th:field="*{valor}"
                           id="produto_preco" name="produto_preco" placeholder="0.00" required/>
                </div>

                <div class="row">
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{~/produtolista}" class="btn btn-secondary">Fechar</a>
                    </div>
                </div>
                <br><br>
                <div th:if="${param.erro}" class="alert alert-danger d-flex flex-column align-items-center text-center"
                     role="alert">
                    <span th:text="${erroDto.mensagem}">Mensagem de erro</span>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">&copy; Turma 2024/2 - 2026/1 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

</body>
</html>
